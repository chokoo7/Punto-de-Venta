<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>La Esquinita - Dashboard</title>
    <link rel="stylesheet" href="Styles/Dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="user-info">
                <img src="img/user.png" alt="Usuario" class="user-avatar">
                <div class="user-details">
                    <h4 id="nombreUsuario">Usuario</h4>
                    <p id="rolUsuario">(Rol)</p>
                </div>
            </div>

            <nav class="menu">
                <a href="Inventario.html"><i class="fas fa-box"></i> Inventario</a>
                <a href="Proveedores.html"><i class="fas fa-truck"></i> Proveedores</a>
                <a href="Ventas.html"><i class="fas fa-cash-register"></i> Ventas</a>
                <a href="EntradaSalidas.html"><i class="fas fa-chart-line"></i> Entradas y Salidas</a>
            </nav>

            <button class="logout-btn"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</button>
        </aside>

        <!-- Main -->
        <main class="main-content">
            <header class="top-bar">
                <div class="welcome-message">
                    <p>Bienvenido a La Esquinita</p>
                </div>
            </header>

            <!-- KPIs -->
            <section class="metrics">
                <div class="card kpi azul">
                    <h3>Valor inventario</h3><span id="valorInventario">$0</span>
                </div>
                <div class="card kpi verde">
                    <h3>Productos en stock</h3><span id="totalProductos">0</span>
                </div>
                <div class="card kpi rojo">
                    <h3>Bajo stock</h3><span id="bajoStock">0</span>
                </div>
            </section>

            <!-- Sección de ventas -->
            <section class="ventas-section">
                <div class="ventas-grafica">
                    <h3>Productos más vendidos</h3>
                    <canvas id="productosVendidos"></canvas>
                </div>
                <div class="ventas-lista">
                    <h3>Últimas ventas <a href="Ventas.html" class="ver-todas">Ver todas</a></h3>
                    <ul id="listaVentas"></ul>
                </div>
            </section>

            <!-- 📌 Botón para gestión de usuarios -->
            <section class="usuarios-section">
                <h3>Gestión de Usuarios</h3>
                <a href="Usuario.html" class="btn-usuarios">➕ Crear Nuevo Usuario</a>
            </section>
        </main>
    </div>

    <script>
        async function cargarUsuario() {
            const res = await fetch("http://localhost:4000/api/auth/usuario", { credentials: "include" });
            if (res.ok) {
                const usuario = await res.json();
                document.getElementById("nombreUsuario").textContent = usuario.nombreUsuario;
                document.getElementById("rolUsuario").textContent = `(${usuario.rol})`;
            }
        }

        async function cargarMetricasInventario() {
            const res = await fetch("http://localhost:4000/api/proveedores/productos/lista", { credentials: "include" });
            const productos = await res.json();

            const valorTotal = productos.reduce((acc, p) => acc + p.cantidadProductos * p.costeProductos, 0);
            const totalProductos = productos.length;
            const bajoStock = productos.filter(p => p.cantidadProductos <= 5).length;

            document.getElementById("valorInventario").textContent = `$${valorTotal.toLocaleString()}`;
            document.getElementById("totalProductos").textContent = totalProductos;
            document.getElementById("bajoStock").textContent = bajoStock;
        }

        async function cargarVentas() {
            const res = await fetch("http://localhost:4000/api/ventas/productos-mas-vendidos", { credentials: "include" });
            const data = await res.json();

            const ctx = document.getElementById("productosVendidos").getContext("2d");
            new Chart(ctx, {
                type: "bar",
                data: {
                    labels: data.map(p => p.nombre),
                    datasets: [{
                        label: "Cantidad vendida",
                        data: data.map(p => p.cantidad),
                        backgroundColor: "#1089d3"
                    }]
                }
            });

            const res2 = await fetch("http://localhost:4000/api/ventas/ultimas", { credentials: "include" });
            const ultimas = await res2.json();
            const lista = document.getElementById("listaVentas");
            lista.innerHTML = "";
            ultimas.forEach(v => {
                const li = document.createElement("li");
                li.textContent = `Productos: ${v.productos.join(", ")} — $${v.totalCompra} — ${new Date(v.fecha).toLocaleString("es-MX")}`;
                lista.appendChild(li);
            });
        }

        cargarUsuario();
        cargarVentas();
        cargarMetricasInventario();

        setInterval(() => {
            cargarVentas();
            cargarMetricasInventario();
        }, 30000);

        document.querySelector(".logout-btn").addEventListener("click", async () => {
            const res = await fetch("http://localhost:4000/api/auth/logout", { method: "POST", credentials: "include" });
            if (res.ok) window.location.href = "Login.html";
        });
    </script>
</body>

</html>
