<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container" id="loginContainer">
        <h2>Iniciar Sesión</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="ejemplo@correo.com">
            </div>
            
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-submit">Ingresar</button>
            <p id="errorMessage" class="error-message"></p>
        </form>
    </div>

    <div class="dashboard-container hidden" id="dashboardContainer">
        <h2 id="welcomeMessage">¡Bienvenido!</h2>
        <p>Selecciona un área para ingresar:</p>
        <div class="menu-buttons" id="menuButtons">
            </div>
        <button class="btn-logout" id="btnLogout">Cerrar Sesión</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
