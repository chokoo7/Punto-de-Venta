<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ventas</title>
    <link rel="stylesheet" href="Styles/ventas.css">
</head>

<body>
    <div class="container">

        <h2>Registrar Nueva Venta</h2>

        <form id="formVenta">
            <div class="form-group">
                <label for="productoId">Seleccionar Producto</label>
                <select id="productoId">
                    <option value="">-- Selecciona un artículo --</option>
                </select>
            </div>

            <div class="form-group">
                <label for="cantidad">Cantidad</label>
                <input type="number" id="cantidad" min="1" value="1">
            </div>

            <div class="form-group">
                <label for="metodoPago">Método de Pago</label>
                <select id="metodoPago" required>
                    <option value="">-- Selecciona método --</option>
                    <option value="efectivo">Efectivo</option>
                    <option value="tarjeta">Tarjeta</option>
                </select>
            </div>

            <button type="button" id="agregarBtn">Agregar al carrito</button>
            <button type="submit">Pagar</button>
        </form>

        <h3>Carrito</h3>

        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Costo Unitario</th>
                    <th>Subtotal</th>
                </tr>
            </thead>
            <tbody id="carrito"></tbody>
        </table>

        <div class="total-box">
            Total a pagar: <span id="totalCompra">$0.00</span>
        </div>

        <div id="ticket" class="ticket-box">
            <div id="ticketTitle" class="ticket-title"></div>
            <div id="ticketBody"></div>
        </div>

    </div>

    <script src="ventas.js"></script>
</body>

</html>
