<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proveedores Disponibles</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <h1>Gestión de Proveedores e Inventario</h1>

    <form id="form-proveedor">
        <h3>Insertar Nuevo Proveedor</h3>
        
        <label for="nombre">Nombre del Proveedor:</label>
        <input type="text" id="nombre" required>

        <label for="productos">Productos a Ofrecer:</label>
        <input type="text" id="productos" required>

        <label for="cantidad">Cantidad del Producto Disponible:</label>
        <input type="number" id="cantidad" step="1" required>

        <label for="total">Total a Pagar:</label>
        <input type="number" id="total" step="1" required>

        <button type="submit">Insertar Proveedor</button>
    </form>

    <hr>

    <h3>Lista de Proveedores</h3>
    
    <div class="table-container">
        <table id="tabla-proveedores">
            <thead>
                <tr>
                    <th>ID Proveedor</th>
                    <th>Nombre</th>
                    <th>Productos a Ofrecer</th>
                    <th>Cantidad Disponible</th>
                    <th>Total a Pagar</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla"></tbody>
        </table>
    </div>

    <script src="Proveedores.js"></script>
</body>
</html>
